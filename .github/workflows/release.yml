name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package release zips
        run: |
          VERSION="${GITHUB_REF_NAME}"

          cd Release.BepInEx
          zip -r "../BirdieMod-BepInEx-${VERSION}.zip" \
            manifest.json \
            README.md \
            icon.png \
            BepInEx/
          cd ..

          cd Release.MelonLoader
          zip -r "../BirdieMod-MelonLoader-${VERSION}.zip" \
            BirdieMod.dll \
            README.md
          cd ..

          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BirdieMod ${{ env.VERSION }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'test') }}
          files: |
            BirdieMod-BepInEx-${{ env.VERSION }}.zip
            BirdieMod-MelonLoader-${{ env.VERSION }}.zip
            Release.BepInEx/BepInEx/plugins/BirdieMod.dll
            Release.MelonLoader/BirdieMod.dll
